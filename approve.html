<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Request Approval · TIF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Asap:wght@400;500;600&family=Asul:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-bg:    #1b2c35;
      --extra-dark: #141f26;
      --accent:     #27b7d8;
      --accent-dim: #1e96b2;
      --light-text: #e8f0f4;
      --muted-text: #7a9aaa;
      --body-text:  #2c3e47;
      --border:     #d0dde3;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Asap', sans-serif;
      background: #f0f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 6px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .card-head {
      background: var(--extra-dark);
      padding: 1.4rem 1.6rem 1.2rem;
    }
    .card-head .logo {
      font-family: 'Asul', serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .card-head h1 {
      font-family: 'Asul', serif;
      font-size: 1.1rem;
      color: var(--light-text);
      font-weight: 700;
    }
    .card-body { padding: 1.5rem 1.6rem 1.8rem; }

    /* ── Request info ── */
    .req-table { width: 100%; border-collapse: collapse; margin-bottom: 1.4rem; font-size: 0.88rem; }
    .req-table td { padding: 0.4rem 0; vertical-align: top; }
    .req-table td:first-child { color: var(--muted-text); font-weight: 600; width: 90px; font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase; padding-right: 0.75rem; }
    .req-table td:last-child  { color: var(--body-text); }
    .req-lang { font-family: 'Asul', serif; font-size: 1.05rem; color: var(--dark-bg) !important; font-weight: 700; }
    .mode-badge {
      display: inline-block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 3px; margin-top: 3px;
    }
    .mode-once    { background: rgba(39,183,216,0.12); color: var(--accent-dim); }
    .mode-ongoing { background: rgba(39,183,216,0.22); color: var(--accent-dim); }
    .mode-deny    { background: rgba(200,50,50,0.10);  color: #c43232; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 120px;
      padding: 0.7rem 1rem;
      border: none; border-radius: 5px;
      font-family: 'Asap', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-approve  { background: var(--accent); color: #fff; }
    .btn-approve:hover:not(:disabled) { background: var(--accent-dim); }
    .btn-deny     { background: #f0f4f6; color: var(--muted-text); border: 1px solid var(--border); }
    .btn-deny:hover:not(:disabled) { background: #e4ecf0; color: var(--body-text); }

    /* ── Status states ── */
    .result-view { display: none; text-align: center; padding: 0.5rem 0 0.25rem; }
    .result-view.show { display: block; }
    .result-icon { font-size: 2.2rem; margin-bottom: 0.75rem; }
    .result-title { font-family: 'Asul', serif; font-size: 1.05rem; color: var(--dark-bg); margin-bottom: 0.5rem; }
    .result-body { font-size: 0.85rem; color: #666; line-height: 1.7; }
    .result-body a { color: var(--accent); }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }

    /* ── Footer ── */
    .page-footer { margin-top: 1.5rem; font-size: 0.75rem; color: #aab8bf; text-align: center; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-head">
    <div class="logo">TIF · Sermon Translations</div>
    <h1 id="pageTitle">Language Request</h1>
  </div>
  <div class="card-body">

    <!-- ── MAIN APPROVAL VIEW ── -->
    <div id="mainView">

      <table class="req-table" id="reqTable">
        <tr><td>Language</td><td class="req-lang" id="rLang">—</td></tr>
        <tr><td>Name</td><td id="rName">—</td></tr>
        <tr><td>Status</td><td id="rStatus">—</td></tr>
        <tr><td>Email</td><td id="rEmail">—</td></tr>
        <tr><td>Action</td><td id="rMode">—</td></tr>
      </table>

      <div class="result-view" id="resultView">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-body" id="resultBody"></div>
      </div>

      <div id="actionArea">
        <div class="btn-row" id="btnRow"></div>
      </div>
    </div>

  </div>
</div>

<div class="page-footer">Taichung International Fellowship &nbsp;·&nbsp; <a href="https://toddblackhurst.github.io/tif-sermons/" style="color:var(--accent);text-decoration:none;">Sermon Translations</a></div>

<script>
  var W3F_KEY = '3fc0c694-adc2-4cda-8191-c4f6993a9a55';

  /* ── Read URL params ── */
  var params  = new URLSearchParams(window.location.search);
  var pLang   = params.get('lang')   || '';
  var pName   = params.get('name')   || '';
  var pEmail  = params.get('email')  || '';
  var pStatus = params.get('status') || '';
  var pMode   = params.get('mode')   || 'once';   // once | ongoing | deny

  /* ── Init ── */
  window.addEventListener('DOMContentLoaded', function() {
    document.getElementById('rLang').textContent   = pLang   || '(unknown)';
    document.getElementById('rName').textContent   = pName   || '(unknown)';
    document.getElementById('rStatus').textContent = pStatus || '(unknown)';
    document.getElementById('rEmail').textContent  = pEmail  || '(unknown)';

    /* Translation is already live — approval is about persistence */
    var modeBadge, pageTitle;
    if (pMode === 'deny') {
      modeBadge = '<span class="mode-badge mode-deny">Remove from this week</span>';
      pageTitle = 'Remove Language Translation';
    } else {
      modeBadge = '<span class="mode-badge mode-ongoing">Translation is live</span>';
      pageTitle = 'Language Translation Added';
    }
    document.getElementById('pageTitle').textContent = pageTitle;
    document.getElementById('rMode').innerHTML = modeBadge;

    /* Build action buttons */
    var btnRow = document.getElementById('btnRow');
    if (pMode === 'deny') {
      var bd = document.createElement('button');
      bd.className = 'btn btn-deny'; bd.textContent = 'Remove from this week';
      bd.id = 'confirmBtn';
      bd.onclick = function() { submitApproval('deny'); };
      var bc2 = document.createElement('button');
      bc2.className = 'btn btn-approve'; bc2.textContent = 'Keep it — this week only';
      bc2.onclick = function() { showResult('kept'); };
      btnRow.appendChild(bd);
      btnRow.appendChild(bc2);
    } else if (pMode === 'ongoing') {
      var ba = document.createElement('button');
      ba.className = 'btn btn-approve'; ba.id = 'confirmBtn';
      ba.textContent = 'Keep for all future sermons';
      ba.onclick = function() { submitApproval('ongoing'); };
      var bc = document.createElement('button');
      bc.className = 'btn btn-deny'; bc.textContent = 'This week only';
      bc.onclick = function() { showResult('once'); };
      btnRow.appendChild(ba);
      btnRow.appendChild(bc);
    } else {
      /* mode=once — just confirm this-week-only */
      var ba2 = document.createElement('button');
      ba2.className = 'btn btn-approve'; ba2.id = 'confirmBtn';
      ba2.textContent = 'Keep for all future sermons';
      ba2.onclick = function() { submitApproval('ongoing'); };
      var bc3 = document.createElement('button');
      bc3.className = 'btn btn-deny'; bc3.textContent = 'This week only';
      bc3.onclick = function() { showResult('once'); };
      btnRow.appendChild(ba2);
      btnRow.appendChild(bc3);
    }
  });

  function submitApproval(mode) {
    var btn = document.getElementById('confirmBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending\u2026'; }

    var body = [
      'TIF-LANG-APPROVE',
      'Language: ' + pLang,
      'Mode: ' + mode,
      'Requester Name: ' + pName,
      'Requester Email: ' + pEmail,
      'Requester Status: ' + pStatus,
      'Approved At: ' + new Date().toISOString()
    ].join('\n');

    fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_key: W3F_KEY,
        subject: 'TIF Language Approval: ' + pLang + ' (' + mode + ')',
        from_name: 'TIF Approval Page',
        message: body
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        showResult('success', mode);
      } else {
        throw new Error(data.message || 'Unknown error');
      }
    })
    .catch(function(err) {
      if (btn) { btn.disabled = false; btn.textContent = mode === 'ongoing' ? 'Approve Ongoing' : 'Approve Once'; }
      showResult('error', null, String(err));
    });
  }

  function showResult(state, mode, errDetail) {
    document.getElementById('actionArea').style.display = 'none';
    document.getElementById('reqTable').style.marginBottom = '0';

    var rv = document.getElementById('resultView');
    rv.classList.add('show');

    var icon  = document.getElementById('resultIcon');
    var title = document.getElementById('resultTitle');
    var body  = document.getElementById('resultBody');

    if (state === 'success' && mode === 'ongoing') {
      icon.textContent  = '✅';
      title.textContent = pLang + ' added permanently';
      body.innerHTML    = pLang + ' will be included in every future sermon translation automatically. <a href="https://toddblackhurst.github.io/tif-sermons/" target="_blank">View the sermon page</a>.';
    } else if (state === 'success' && mode === 'deny') {
      icon.textContent  = '🗑️';
      title.textContent = 'Translation removed';
      body.textContent  = 'The ' + pLang + ' translation has been removed from this week\'s sermon.';
    } else if (state === 'once') {
      icon.textContent  = '👍';
      title.textContent = 'Kept for this week';
      body.innerHTML    = 'No changes made. The ' + pLang + ' translation will be live through this Sunday, then removed when the next sermon publishes. <a href="https://toddblackhurst.github.io/tif-sermons/" target="_blank">View it now</a>.';
    } else if (state === 'kept') {
      icon.textContent  = '👍';
      title.textContent = 'Kept for this week';
      body.innerHTML    = 'The ' + pLang + ' translation will stay through this Sunday. <a href="https://toddblackhurst.github.io/tif-sermons/" target="_blank">View it now</a>.';
    } else if (state === 'ignored') {
      icon.textContent  = '🚫';
      title.textContent = 'Request Denied';
      body.textContent  = 'No translation will be created.';
    } else {
      icon.textContent  = '❌';
      title.textContent = 'Something went wrong';
      body.innerHTML    = 'Could not send approval. Try refreshing and trying again.<br><br><small style="color:#aaa;">' + (errDetail || '') + '</small>';
    }
  }
</script>
</body>
</html>
